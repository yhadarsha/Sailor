<div class="bg-white border border-slate-200 rounded-xl px-4 py-3 text-center">
  <p class="text-xl font-bold
    {% if color == 'emerald' %}text-emerald-600
    {% elif color == 'sky' %}text-sky-600
    {% else %}text-slate-700{% endif %}">
    {{ value }}{% if suffix %}{{ suffix }}{% endif %}
  </p>
  <p class="text-[10px] text-slate-400 mt-0.5">{{ label }}</p>
</div>
